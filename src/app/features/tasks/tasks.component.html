<mat-toolbar color="primary" class="app-toolbar">
  <div class="toolbar-content">
    <div class="brand">
      <mat-icon aria-hidden="true">rocket_launch</mat-icon>
      <span class="brand-title">ATOM Tasks</span>
    </div>

    <div class="toolbar-actions">
      <button
        mat-icon-button
        [matMenuTriggerFor]="userMenu"
        [attr.aria-label]="'Menú de usuario: ' + user()?.email"
        class="user-trigger"
      >
        <div class="user-avatar">{{ userInitial() }}</div>
      </button>
      <mat-menu #userMenu="matMenu">
        <div class="user-info" mat-menu-item disabled>
          <mat-icon>account_circle</mat-icon>
          <span>{{ user()?.email }}</span>
        </div>
        <button mat-menu-item type="button" (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Cerrar sesión</span>
        </button>
      </mat-menu>
    </div>
  </div>
</mat-toolbar>

<main class="tasks-page">
  <div class="content">
    <section class="form-section" id="task-form-anchor">
      <mat-card appearance="outlined">
        <mat-card-header>
          <mat-card-title>
            {{ editingTask() ? 'Editar tarea' : 'Nueva tarea' }}
          </mat-card-title>
          @if (editingTask()) {
            <mat-card-subtitle>
              Modificando: {{ editingTask()?.title }}
            </mat-card-subtitle>
          }
        </mat-card-header>

        <mat-card-content>
          <atom-task-form
            [task]="editingTask()"
            [submitting]="saving()"
            (save)="onFormSubmit($event)"
            (cancel)="onEditCanceled()"
          />
        </mat-card-content>
      </mat-card>
    </section>

    <atom-task-list
      [tasks]="tasks()"
      [filter]="filter()"
      [loading]="loading()"
      [busyTaskIds]="busyIds()"
      (filterChange)="onFilterChange($event)"
      (toggleCompleted)="onToggleCompleted($event)"
      (edit)="onEditClicked($event)"
      (delete)="onDeleteClicked($event)"
    />
  </div>
</main>
