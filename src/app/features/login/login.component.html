<main class="login-page">
  <mat-card class="login-card" appearance="outlined">
    <mat-card-header class="login-header">
      <div class="brand">
        <mat-icon class="brand-icon" aria-hidden="true">rocket_launch</mat-icon>
        <h1 class="brand-title">ATOM Tasks</h1>
      </div>
      <p class="brand-subtitle">Ingresa tu correo para acceder a tus tareas</p>
    </mat-card-header>

    <mat-card-content>
      <form
        [formGroup]="form"
        (ngSubmit)="onSubmit()"
        class="login-form"
        novalidate
        aria-labelledby="login-heading"
      >
        <span id="login-heading" class="visually-hidden">Formulario de inicio de sesión</span>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Correo electrónico</mat-label>
          <input
            matInput
            type="email"
            formControlName="email"
            placeholder="tu@email.com"
            autocomplete="email"
            inputmode="email"
            required
            [attr.aria-invalid]="form.controls.email.invalid && form.controls.email.touched"
          />
          <mat-icon matSuffix aria-hidden="true">mail_outline</mat-icon>
          @if (emailError(); as error) {
            <mat-error>{{ error }}</mat-error>
          }
        </mat-form-field>

        <button
          mat-flat-button
          color="primary"
          type="submit"
          class="submit-btn"
          [disabled]="form.invalid || loading()"
        >
          @if (loading()) {
            <ng-container>
              <mat-progress-spinner
                mode="indeterminate"
                diameter="20"
                aria-label="Procesando"
              />
              <span>{{ statusLabel() }}</span>
            </ng-container>
          } @else {
            <ng-container>
              <span>Continuar</span>
              <mat-icon aria-hidden="true">arrow_forward</mat-icon>
            </ng-container>
          }
        </button>
      </form>
    </mat-card-content>

    <mat-card-footer class="login-footer">
      <small>
        Si es tu primera vez, te pediremos confirmar la creación de tu cuenta.
      </small>
    </mat-card-footer>
  </mat-card>
</main>
